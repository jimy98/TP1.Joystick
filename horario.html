<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Horarios de Juego - JOSE JOYSTICKS (JJ)</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <header>
        <h1>Mi Cronograma Gamer</h1>

        <nav>
            <a href="index.html">Volver al Inicio</a>
        </nav>
    </header>

    <main>
        <section>
            

            <!-- TABLA (table):
            Se usa para organizar informacion
            en filas y columnas.

            Ejemplo:
            horarios, notas, cronogramas,
            inventarios, etc.
            -->

            <table border="1">

                <!-- THEAD:
                Representa el encabezado de la tabla.
                Aquí normalmente van los títulos
                principales de cada columna.
                -->

                <thead>
                    <tr>

                        <!-- TR:
                        Significa Table Row
                        (fila de la tabla)
                        -->

                        <!-- TH:
                        Significa Table Header
                        (encabezado de columna)

                        Se usa para titulos y aparece
                        en negrita automaticamente.
                        -->

                        <th>Franja Horaria</th>
                        <th>Lunes</th>
                        <th>Martes</th>
                        <th>Miércoles</th>
                        <th>Jueves</th>
                        <th>Viernes</th>
                    </tr>
                </thead>

                <!-- TBODY:
                Es el cuerpo principal de la tabla,
                donde va la informacion real.
                -->

                <tbody>
                    <tr>

                        <!-- TD:
                        Se usa para los datos normales
                        dentro de la tabla.
                        -->

                        <td>21:00 - 23:00</td>
                        <td>EA FC 26 (Fifa)</td>
                        <td>Fortnite (Ranked)</td>

                        <!-- ROWSPAN:
                        Une filas verticalmente.

                        rowspan="2"
                        significa que esta celda ocupa
                        2 filas.
                        -->

                        <td rowspan="2">Maratón de Forza Horizon</td>

                        <td>NBA 2K26</td>
                        <td>Fortnite (Squads)</td>
                    </tr>

                    <tr>
                        <td>23:00 - 01:00</td>

                        <!-- COLSPAN:
                        Une columnas horizontalmente.

                        colspan="2"
                        significa que esta celda ocupa
                        2 columnas.
                        -->

                        <td colspan="2">Torneo de NBA 2K</td>

                        <td>EA FC 26 (Fifa)</td>
                        <td>Free Play</td>
                    </tr>
                </tbody>
            </table>

        </section>
    </main>

    <footer>
        <p>© JOSE JOYSTICKS (JJ) - 2026</p>
    </footer>

</body>
</html>
